{{ template "header.html" . }}

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
        <h2 class="text-center mb-4">Запись на прием</h2>
        <p class="text-center text-muted small mb-3">Приём ведётся <strong>с понедельника по пятницу</strong>, с 12:00 до 18:00</p>
        <form id="mainBookingForm">

            <div class="mb-3">
                <label class="form-label fw-bold">Направление</label>
                <select id="specialization" class="form-select form-select-lg" required>
                    <option value="" disabled selected>Выберите направление...</option>
                    <option value="Терапевт">Терапия</option>
                    <option value="Кардиолог">Кардиология</option>
                    <option value="Невролог">Неврология</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Врач</label>
                <select id="doctorList" class="form-select form-select-lg" disabled required>
                    <option value="">Сначала выберите направление</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Дата приема</label>
                <input type="text" id="appointmentDate" class="form-control" placeholder="Выберите дату (Пн–Пт)" readonly required>
                <input type="hidden" id="appointmentDateValue">
                <div class="form-text text-muted small mt-1">
                    <span class="text-danger">⬛</span> серые — выходные (недоступно)
                </div>
            </div>

            <div class="mb-3" id="timeSlotBlock" style="display:none!important;">
                <label class="form-label fw-bold">Время приема</label>
                <div id="timeSlots" class="d-flex flex-wrap gap-2 mt-1"></div>
                <input type="hidden" id="selectedTime" required>
                <div class="form-text text-danger d-none" id="timeError">Пожалуйста, выберите время</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Ваше имя</label>
                <input type="text" id="patientName" class="form-control" placeholder="Иван Иванов" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Телефон</label>
                <input type="tel" id="patientPhone" class="form-control" placeholder="+7 (___) ___-__-__" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Email</label>
                <input type="email" id="patientEmail" class="form-control" placeholder="example@mail.ru" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">Подтвердить запись</button>
        </form>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
<script src="https://unpkg.com/imask"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const docSelect     = document.getElementById('doctorList');
    const specSelect    = document.getElementById('specialization');
    const timeSlotBlock = document.getElementById('timeSlotBlock');
    const timeSlotsDiv  = document.getElementById('timeSlots');
    const selectedTime  = document.getElementById('selectedTime');
    const timeError     = document.getElementById('timeError');
    const bookingForm   = document.getElementById('mainBookingForm');
    const hiddenDate    = document.getElementById('appointmentDateValue');

    // Накладываем интерактивную маску на инпут телефона
    const phoneInput = document.getElementById('patientPhone');
    const phoneMask = IMask(phoneInput, {
        mask: '+7 (000) 000-00-00'
    });

    const ALL_SLOTS = ['12:00','13:00','14:00','15:00','16:00','17:00','18:00'];

    // Инициализация flatpickr — блокируем субботу (6) и воскресенье (0)
    const fp = flatpickr('#appointmentDate', {
        locale: 'ru',
        minDate: 'today',
        dateFormat: 'd.m.Y',
        disable: [
            function(date) {
                return date.getDay() === 0 || date.getDay() === 6;
            }
        ],
        disableMobile: true,
        onChange: function(selectedDates, dateStr) {
            if (selectedDates.length === 0) {
                hiddenDate.value = '';
                timeSlotBlock.style.setProperty('display', 'none', 'important');
                return;
            }
            // Сохраняем в формате YYYY-MM-DD для API
            const d = selectedDates[0];
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth()+1).padStart(2,'0');
            const dd = String(d.getDate()).padStart(2,'0');
            hiddenDate.value = `${yyyy}-${mm}-${dd}`;

            selectedTime.value = '';
            timeSlotsDiv.innerHTML = '';
            if (docSelect.value) loadSlots();
        }
    });

    async function loadDoctors(targetDocId) {
        if (!specSelect.value) return;
        docSelect.disabled = false;
        docSelect.innerHTML = '<option>Загрузка...</option>';
        try {
            const res = await fetch('/api/get_doctors?spec=' + encodeURIComponent(specSelect.value));
            const doctors = await res.json();

            // Плейсхолдер добавляем без selected если будем выбирать врача автоматически
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.disabled = true;
            placeholder.textContent = 'Выберите специалиста';
            if (!targetDocId) placeholder.selected = true;
            docSelect.innerHTML = '';
            docSelect.appendChild(placeholder);

            if (doctors && doctors.length > 0) {
                let found = false;
                doctors.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.name;
                    // Сравниваем как строки — URL всегда строка
                    if (targetDocId && String(d.id) === String(targetDocId)) {
                        opt.selected = true;
                        found = true;
                    }
                    docSelect.appendChild(opt);
                });
                // Если врач выбран автоматически — грузим слоты
                if (found && hiddenDate.value) loadSlots();
            } else {
                docSelect.innerHTML = '<option disabled>Врачи не найдены</option>';
            }
        } catch (e) {
            docSelect.innerHTML = '<option disabled>Ошибка загрузки</option>';
        }
    }

    async function loadSlots() {
        const date     = hiddenDate.value;
        const doctorId = docSelect.value;

        if (!date || !doctorId) {
            timeSlotBlock.style.setProperty('display', 'none', 'important');
            return;
        }

        timeSlotsDiv.innerHTML = '<span class="text-muted">Проверка...</span>';
        timeSlotBlock.style.removeProperty('display');

        try {
            const res  = await fetch(`/api/get_slots?doctor_id=${doctorId}&date=${date}&type=offline`);
            const busy = await res.json();

            timeSlotsDiv.innerHTML = '';
            selectedTime.value = '';

            ALL_SLOTS.forEach(slot => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = slot;

                if (busy && busy.includes(slot)) {
                    btn.disabled = true;
                    btn.className = 'btn btn-secondary';
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    btn.title = 'Время уже занято';
                } else {
                    btn.className = 'btn btn-outline-primary';
                    btn.addEventListener('click', function () {
                        timeSlotsDiv.querySelectorAll('button').forEach(b => {
                            b.classList.remove('btn-primary');
                            b.classList.add('btn-outline-primary');
                        });
                        btn.classList.remove('btn-outline-primary');
                        btn.classList.add('btn-primary');
                        selectedTime.value = slot;
                        timeError.classList.add('d-none');
                    });
                }
                timeSlotsDiv.appendChild(btn);
            });
        } catch (e) {
            timeSlotsDiv.innerHTML = '<span class="text-danger">Ошибка слотов</span>';
        }
    }

    specSelect.addEventListener('change', () => loadDoctors());
    docSelect.addEventListener('change', () => loadSlots());

    // URL-параметры (переход с карточки врача)
    const urlParams    = new URLSearchParams(window.location.search);
    const specFromUrl  = urlParams.get('spec');
    const docIdFromUrl = urlParams.get('docId');
    if (specFromUrl) {
        specSelect.value = specFromUrl;
        loadDoctors(docIdFromUrl);
    }

    bookingForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        if (!docSelect.value) { alert('Пожалуйста, выберите врача'); return; }
        if (!hiddenDate.value) { alert('Пожалуйста, выберите дату'); return; }
        if (!selectedTime.value) {
            timeError.classList.remove('d-none');
            timeSlotBlock.scrollIntoView({ behavior: 'smooth' });
            return;
        }

        const formData = {
            name:        document.getElementById('patientName').value,
            spec:        specSelect.value,
            doctor_name: docSelect.options[docSelect.selectedIndex].text,
            date:        hiddenDate.value,
            time:        selectedTime.value,
            phone:       document.getElementById('patientPhone').value,
            email:       document.getElementById('patientEmail').value,
            doctor_id:   parseInt(docSelect.value)
        };

        try {
            const response = await fetch('/api/create_appointment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert(`Успешно! Вы записаны на ${formData.date} в ${formData.time}.`);
                window.location.href = '/';
            } else {
                alert('Ошибка: ' + await response.text());
                loadSlots();
            }
        } catch (error) {
            alert('Ошибка связи с сервером.');
        }
    });
});
</script>
