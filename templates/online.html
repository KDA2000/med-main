{{ template "header.html" . }}

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px; border-top: 5px solid #28a745;">
        <h2 class="text-center mb-4">Запись на онлайн-консультацию</h2>
        <p class="text-center text-muted small mb-3">Онлайн-консультации проводятся <strong>в субботу и воскресенье</strong>, с 12:00 до 18:00</p>
        <form id="onlineBookingForm">

            <div class="mb-3">
                <label class="form-label fw-bold">Направление</label>
                <select id="specialization" class="form-select form-select-lg" required>
                    <option value="" disabled selected>Выберите направление...</option>
                    <option value="Терапевт">Терапия (Online)</option>
                    <option value="Кардиолог">Кардиология (Online)</option>
                    <option value="Невролог">Неврология (Online)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Врач</label>
                <select id="doctorList" class="form-select form-select-lg" disabled required>
                    <option value="">Сначала выберите направление</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Дата консультации</label>
                <input type="text" id="appointmentDate" class="form-control" placeholder="Выберите дату (Сб–Вс)" readonly required>
                <input type="hidden" id="appointmentDateValue">
                <div class="form-text text-muted small mt-1">
                    <span class="text-muted">⬛</span> серые — будние дни (только выходные)
                </div>
            </div>

            <div class="mb-3" id="timeSlotBlock" style="display:none!important;">
                <label class="form-label fw-bold">Время консультации</label>
                <div id="timeSlots" class="d-flex flex-wrap gap-2 mt-1"></div>
                <input type="hidden" id="selectedTime" required>
                <div class="form-text text-danger d-none" id="timeError">Пожалуйста, выберите время</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Ваше имя</label>
                <input type="text" id="patientName" class="form-control" placeholder="Иван Иванов" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Телефон для связи</label>
                <input type="tel" id="patientPhone" class="form-control" placeholder="+7 (___) ___-__-__" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Email (куда отправить ссылку на созвон)</label>
                <input type="email" id="patientEmail" class="form-control" placeholder="example@mail.ru" required>
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100">Забронировать онлайн-прием</button>
        </form>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const specSelect    = document.getElementById('specialization');
    const docSelect     = document.getElementById('doctorList');
    const timeSlotBlock = document.getElementById('timeSlotBlock');
    const timeSlotsDiv  = document.getElementById('timeSlots');
    const selectedTime  = document.getElementById('selectedTime');
    const timeError     = document.getElementById('timeError');
    const bookingForm   = document.getElementById('onlineBookingForm');
    const hiddenDate    = document.getElementById('appointmentDateValue');

    const ALL_SLOTS = ['12:00','13:00','14:00','15:00','16:00','17:00','18:00'];

    // Блокируем будние дни — только суббота (6) и воскресенье (0)
    const fp = flatpickr('#appointmentDate', {
        locale: 'ru',
        minDate: 'today',
        dateFormat: 'd.m.Y',
        disable: [
            function(date) {
                const day = date.getDay();
                return day !== 0 && day !== 6; // блокируем всё кроме выходных
            }
        ],
        disableMobile: true,
        onChange: function(selectedDates) {
            if (selectedDates.length === 0) {
                hiddenDate.value = '';
                timeSlotBlock.style.setProperty('display', 'none', 'important');
                return;
            }
            const d = selectedDates[0];
            hiddenDate.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            selectedTime.value = '';
            timeSlotsDiv.innerHTML = '';
            if (docSelect.value) loadSlots();
        }
    });

    async function loadDoctors(targetDocId) {
        if (!specSelect.value) return;
        docSelect.disabled = false;
        docSelect.innerHTML = '<option>Загрузка...</option>';
        try {
            const res = await fetch('/api/get_doctors?spec=' + encodeURIComponent(specSelect.value));
            const doctors = await res.json();
            docSelect.innerHTML = '<option value="" disabled selected>Выберите специалиста</option>';
            if (doctors && doctors.length > 0) {
                doctors.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.name;
                    if (targetDocId && d.id == targetDocId) opt.selected = true;
                    docSelect.appendChild(opt);
                });
            } else {
                docSelect.innerHTML = '<option disabled>Врачи не найдены</option>';
            }
        } catch (e) {
            docSelect.innerHTML = '<option disabled>Ошибка загрузки</option>';
        }
        if (hiddenDate.value) loadSlots();
    }

    async function loadSlots() {
        const date     = hiddenDate.value;
        const doctorId = docSelect.value;
        if (!date || !doctorId) {
            timeSlotBlock.style.setProperty('display', 'none', 'important');
            return;
        }

        timeSlotsDiv.innerHTML = '<span class="text-muted">Проверка доступности...</span>';
        timeSlotBlock.style.removeProperty('display');

        try {
            const res  = await fetch(`/api/get_slots?doctor_id=${doctorId}&date=${date}&type=online`);
            const busy = await res.json();

            timeSlotsDiv.innerHTML = '';
            selectedTime.value = '';

            ALL_SLOTS.forEach(slot => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = slot;

                if (busy && busy.includes(slot)) {
                    btn.disabled = true;
                    btn.className = 'btn btn-secondary';
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    btn.title = 'Это время уже забронировано';
                } else {
                    btn.className = 'btn btn-outline-success';
                    btn.addEventListener('click', function () {
                        timeSlotsDiv.querySelectorAll('button').forEach(b => {
                            b.classList.remove('btn-success');
                            b.classList.add('btn-outline-success');
                        });
                        btn.classList.remove('btn-outline-success');
                        btn.classList.add('btn-success');
                        selectedTime.value = slot;
                        timeError.classList.add('d-none');
                    });
                }
                timeSlotsDiv.appendChild(btn);
            });
        } catch (e) {
            timeSlotsDiv.innerHTML = '<span class="text-danger">Ошибка связи с сервером</span>';
        }
    }

    specSelect.addEventListener('change', () => loadDoctors());
    docSelect.addEventListener('change', () => loadSlots());

    const urlParams    = new URLSearchParams(window.location.search);
    const specFromUrl  = urlParams.get('spec');
    const docIdFromUrl = urlParams.get('docId');
    if (specFromUrl) {
        specSelect.value = specFromUrl;
        loadDoctors(docIdFromUrl);
    }

    bookingForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        if (!docSelect.value) { alert('Пожалуйста, выберите врача'); return; }
        if (!hiddenDate.value) { alert('Пожалуйста, выберите дату'); return; }
        if (!selectedTime.value) {
            timeError.classList.remove('d-none');
            timeSlotBlock.scrollIntoView({ behavior: 'smooth' });
            return;
        }

        const formData = {
            name:        document.getElementById('patientName').value,
            spec:        specSelect.value,
            doctor_name: docSelect.options[docSelect.selectedIndex].text,
            date:        hiddenDate.value,
            time:        selectedTime.value,
            phone:       document.getElementById('patientPhone').value,
            email:       document.getElementById('patientEmail').value,
            doctor_id:   parseInt(docSelect.value)
        };

        try {
            const response = await fetch('/api/create_online_appointment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert(`Вы записаны на онлайн-консультацию ${formData.date} в ${formData.time}. Ссылка придёт на почту!`);
                window.location.href = '/';
            } else if (response.status === 409) {
                alert('Этот слот уже занят. Пожалуйста, выберите другое время.');
                loadSlots();
            } else {
                alert('Ошибка при сохранении: ' + await response.text());
            }
        } catch (error) {
            alert('Не удалось связаться с сервером.');
        }
    });
});
</script>
